name: Generate Release Keystore (run manually, once)

# One-time helper: creates a new Android signing keystore with a randomly
# generated password, prints everything needed to register it as repo
# secrets, then you delete this run's log. Do NOT run this more than once
# for the same app unless you intend to replace the signing key entirely
# (Play Store ties future updates to the original signing key).

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (any name you like)'
        required: true
        default: 'release'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore with random passwords
        run: |
          STORE_PASSWORD=$(openssl rand -base64 24)
          KEY_PASSWORD=$(openssl rand -base64 24)
          keytool -genkeypair -v \
            -keystore release-key.jks \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Hebrew Spelling App, OU=, O=, L=, ST=, C=IL"

          echo "================================================================"
          echo "COPY THESE NOW - they will not be shown again after this run's"
          echo "log is deleted, and you should delete the log right after:"
          echo "================================================================"
          echo "ANDROID_KEYSTORE_PASSWORD = $STORE_PASSWORD"
          echo "ANDROID_KEY_ALIAS         = ${{ inputs.key_alias }}"
          echo "ANDROID_KEY_PASSWORD      = $KEY_PASSWORD"
          echo "ANDROID_KEYSTORE_BASE64   (see uploaded artifact: release-key.b64.txt)"
          echo "================================================================"

          base64 -w 0 release-key.jks > release-key.b64.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release-key.jks
            release-key.b64.txt
          retention-days: 1
