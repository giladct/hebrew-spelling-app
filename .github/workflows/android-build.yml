name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    runs-on: ubuntu-latest
    # Only runs once the signing secrets exist (see .github/workflows/generate-keystore.yml
    # for how to create and register them). Until then this job is skipped entirely.
    if: ${{ vars.HAS_RELEASE_SIGNING == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

      - name: Build signed release App Bundle
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: release-key.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # Run number only ever increases, so this can never collide with a
          # version code already used on a previous upload (see commit
          # history for how much manual bumping that saved us from).
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew bundleRelease

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Publish to Play Console
        # Only runs once a service account key is registered (see
        # .github/setup-docs/play-publishing-setup.md). Until then this step is skipped.
        if: ${{ vars.HAS_PLAY_PUBLISHING == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: hebrew_spelling.myapp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ vars.PLAY_TRACK || 'internal' }}
          # While the app itself is still in "draft" status in Play Console
          # (store listing / content rating / data safety not all submitted
          # yet), only draft releases can be created on tracks other than
          # Internal Testing. Uploading as draft always works regardless of
          # that status - you just need to manually hit "review and roll
          # out" in Play Console afterwards until the app's setup is complete.
          status: draft
