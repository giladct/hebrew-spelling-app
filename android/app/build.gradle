apply plugin: 'com.android.application'

// Release signing: looks for credentials in environment variables first (used by CI,
// see .github/workflows/android-build.yml), then falls back to a local
// android/keystore.properties file (gitignored - never commit a real keystore or its
// passwords). If neither is present, the release build type is simply left unsigned.
def releaseStoreFile = null
def releaseStorePassword = null
def releaseKeyAlias = null
def releaseKeyPassword = null

if (System.getenv("ANDROID_KEYSTORE_PATH")) {
    releaseStoreFile = file(System.getenv("ANDROID_KEYSTORE_PATH"))
    releaseStorePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
    releaseKeyAlias = System.getenv("ANDROID_KEY_ALIAS")
    releaseKeyPassword = System.getenv("ANDROID_KEY_PASSWORD")
} else {
    def keystorePropsFile = rootProject.file('keystore.properties')
    if (keystorePropsFile.exists()) {
        def keystoreProps = new Properties()
        keystoreProps.load(new FileInputStream(keystorePropsFile))
        releaseStoreFile = rootProject.file(keystoreProps['storeFile'])
        releaseStorePassword = keystoreProps['storePassword']
        releaseKeyAlias = keystoreProps['keyAlias']
        releaseKeyPassword = keystoreProps['keyPassword']
    }
}

// Play Console requires every uploaded bundle to have a strictly higher
// versionCode than any build ever uploaded before, across all tracks - not
// just the latest one. Hand-bumping this after every rejected upload was
// error-prone (burned several version codes), so it's now derived from the
// CI run number, which only ever increases. Locally (no CI env var set) it
// falls back to a fixed low number - fine, since local builds aren't what
// gets uploaded to Play Console anyway.
def androidVersionCode = (System.getenv("ANDROID_VERSION_CODE") ?: "4").toInteger()

android {
    namespace = "hebrew_spelling.myapp"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "hebrew_spelling.myapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode androidVersionCode
        versionName "1.0.${androidVersionCode}"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (releaseStoreFile != null) {
                storeFile releaseStoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseStoreFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
