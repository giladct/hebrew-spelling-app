<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>לומדים לאיית</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>לומדים לאיית</h1>
      <div id="levelSelect">
        <button class="levelBtn active" data-level="0">שלב 1: קמץ ופתח</button>
        <button class="levelBtn" data-level="1">שלב 2: חיריק</button>
        <button class="levelBtn" data-level="2">שלב 3: קמץ, פתח וחיריק</button>
        <button class="levelBtn" data-level="3">שלב 4: חולם, חיריק, קמץ ופתח</button>
        <button class="levelBtn" data-level="4">שלב 5: צירה, סגול, חיריק, קמץ ופתח</button>
      </div>
      <div id="progress">מילה <span id="wordIndex">1</span> מתוך <span id="wordTotal">5</span></div>
    </header>

    <main>
      <div id="pictureBox"></div>

      <button id="hintBtn">🔊 השמע מילה</button>

      <div id="slots"></div>

      <div id="tray"></div>

      <div id="feedback"></div>
    </main>

    <button id="nextBtn" class="hidden">הבא ←</button>

    <div id="balloonsOverlay"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
