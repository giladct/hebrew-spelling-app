<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>לומדים לקרוא עברית</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="homeScreen">
      <div id="homeLogo">🐫</div>
      <h1>לומדים לקרוא עברית</h1>
      <p class="subtitle">בחרו שלב להתחיל</p>
      <button id="continueBtn" class="hidden">המשך מאיפה שהפסקת ←</button>
      <div id="stageCards"></div>
    </div>

    <div id="gameScreen" class="hidden">
      <header>
        <button id="homeBtn">🏠 בית</button>
        <h1>לומדים לקרוא עברית</h1>
        <div id="progress">מילה <span id="wordIndex">1</span> מתוך <span id="wordTotal">5</span></div>
      </header>

      <main>
        <button id="skipBtn">⏭️ דלג</button>

        <div id="pictureBox"></div>

        <div id="actionRow">
          <button id="hintBtn">🔊 השמע מילה</button>
        </div>

        <div id="slots"></div>

        <div id="tray"></div>

        <div id="feedback"></div>
      </main>

      <button id="nextBtn" class="hidden">הבא ←</button>
    </div>

    <div id="balloonsOverlay"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
